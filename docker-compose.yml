services:
  bili-up:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bili-up
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    command: ["scheduler"]
